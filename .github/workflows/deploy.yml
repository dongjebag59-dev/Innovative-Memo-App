name: CI/CD Deploy

on:
  push:
    branches: [main]

jobs:
  # ── 테스트 (Railway 배포 전 검증) ──────────────────────────
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: 패키지 설치
        run: pip install -r requirements.txt

      - name: Django 시스템 체크
        run: python manage.py check
        env:
          SECRET_KEY: ci-test-secret-key-not-for-production
          DEBUG: "True"

  # ── Railway 자동 배포 안내 ──────────────────────────────────
  # Railway는 GitHub push를 자동 감지하여 배포합니다.
  # 별도의 deploy job 불필요.
