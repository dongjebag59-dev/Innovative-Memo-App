services:

  # ── DB 서버 (PostgreSQL) ──────────────────────────────────
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-focusmemo}
      POSTGRES_USER: ${POSTGRES_USER:-focususer}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-focususer}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── 앱 서버 (Django + Gunicorn) ───────────────────────────
  web:
    build:
      context: .
      dockerfile: Dockerfile.compose
    restart: always
    environment:
      SECRET_KEY: ${SECRET_KEY}
      DEBUG: "False"
      ALLOWED_HOSTS: ${ALLOWED_HOSTS}
      CSRF_TRUSTED_ORIGINS: ${CSRF_TRUSTED_ORIGINS}
      DATABASE_URL: postgres://${POSTGRES_USER:-focususer}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-focusmemo}
    volumes:
      - static_volume:/app/staticfiles
    depends_on:
      db:
        condition: service_healthy

  # ── 문지기 서버 (Nginx) ───────────────────────────────────
  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - static_volume:/app/staticfiles:ro
    depends_on:
      - web

volumes:
  postgres_data:
  static_volume:
