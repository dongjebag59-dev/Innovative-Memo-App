<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>{% block title %}Focus Memo{% endblock %}</title>
  <style>
    :root {
      --bg:#f7f5f1; --card:#fff; --text:#2f2f2f; --muted:#8b8b8b;
      --line:#e7e2d9; --input-bg:#f9f7f3;
      --brand:#8fa18f; --brand-d:#7f937f; --accent:#c9b38a;
      --danger:#e05252; --r:14px; --r-lg:22px;
    }
    *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
    body {
      background:var(--bg); color:var(--text);
      font-family:ui-sans-serif,system-ui,-apple-system,
        "Apple SD Gothic Neo","Noto Sans KR","Malgun Gothic",sans-serif;
      min-height:100vh; display:flex; align-items:center; justify-content:center;
    }
    .wrap { width:100%; max-width:420px; padding:32px 16px 60px; }
    .brand { text-align:center; margin-bottom:22px; }
    .brand-title { font-family:Georgia,"Times New Roman",serif; font-size:42px; color:var(--brand-d); }
    .brand-bar { width:36px; height:3px; background:var(--accent); margin:10px auto; border-radius:99px; }
    .brand-sub { color:var(--muted); font-size:14px; margin-top:6px; }
    .card {
      background:var(--card); border:1px solid #eee;
      border-radius:var(--r-lg); padding:28px 24px 24px;
      box-shadow:0 10px 28px rgba(0,0,0,.07);
    }
    .card-title { text-align:center; font-size:22px; font-weight:800; margin-bottom:20px; }
    .field { margin-bottom:16px; }
    .field-label { display:block; font-size:13px; color:#6e6e6e; margin-bottom:8px; font-weight:600; }
    .req { color:var(--accent); margin-right:4px; }
    .input {
      width:100%; padding:13px 14px; border-radius:var(--r);
      border:1px solid var(--line); background:var(--input-bg);
      font-size:14px; outline:none; font-family:inherit;
      transition:border-color .15s, box-shadow .15s;
    }
    .input:focus { border-color:var(--accent); box-shadow:0 0 0 3px rgba(201,179,138,.18); }
    .btn {
      width:100%; margin-top:16px; padding:14px;
      border-radius:var(--r); border:none;
      background:var(--brand); color:#fff;
      font-weight:800; font-size:15px; cursor:pointer;
      transition:.15s; font-family:inherit;
    }
    .btn:hover { background:var(--brand-d); }
    .or { display:flex; align-items:center; gap:10px; margin:18px 0 14px; color:#aaa; font-size:13px; }
    .or::before, .or::after { content:""; flex:1; height:1px; background:var(--line); }
    .link { display:block; text-align:center; color:var(--brand-d); text-decoration:none; font-weight:700; padding:8px 0; }
    .link:hover { text-decoration:underline; }
    .errors { background:#fff3f3; border:1px solid #ffd4d4; color:#b00020; border-radius:var(--r); padding:10px 14px; font-size:13px; margin-bottom:14px; }
    .hint { color:var(--muted); font-size:12px; margin-top:5px; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="brand">
      <div class="brand-title">Focus Memo</div>
      <div class="brand-bar"></div>
      <p class="brand-sub">기록을 검색 가능한 데이터로</p>
    </div>
    <div class="card">
      {% block content %}{% endblock %}
    </div>
  </div>
</body>
</html>
