<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>{% block title %}Focus Memo{% endblock %}</title>
  <style>
    :root {
      --bg:#f7f5f1; --card:#fff; --text:#2f2f2f; --muted:#8b8b8b;
      --line:#e7e2d9; --input-bg:#f9f7f3;
      --brand:#8fa18f; --brand-d:#7f937f; --brand-light:#f1f6ef;
      --accent:#c9b38a;
      --pin-bg:#fff8e6; --pin-border:#f0dfa0; --pin-text:#8a6820;
      --secret-bg:#f0eeff; --secret-border:#d8cfff; --secret-text:#6b52ae;
      --danger:#e05252;
      --r-sm:10px; --r:16px; --r-lg:22px;
    }
    *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
    body {
      background:var(--bg); color:var(--text);
      font-family:ui-sans-serif,system-ui,-apple-system,
        "Apple SD Gothic Neo","Noto Sans KR","Malgun Gothic",sans-serif;
      font-size:15px; line-height:1.65;
    }
    .container { max-width:860px; margin:0 auto; padding:0 16px; }

    /* ── Header ── */
    .site-header {
      background:#fff; border-bottom:1px solid var(--line);
      padding:12px 0; position:sticky; top:0; z-index:200;
    }
    .header-inner { display:flex; align-items:center; justify-content:space-between; gap:12px; }
    .brand {
      font-size:22px; font-weight:800; color:var(--brand-d);
      text-decoration:none; font-family:Georgia,"Times New Roman",serif;
    }
    .header-right { display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
    .username { color:var(--muted); font-size:13px; white-space:nowrap; }

    /* ── Buttons ── */
    .btn {
      display:inline-flex; align-items:center; justify-content:center; gap:6px;
      padding:10px 18px; border-radius:var(--r-sm); font-size:14px; font-weight:700;
      cursor:pointer; text-decoration:none; border:none; transition:.15s; white-space:nowrap;
      font-family:inherit;
    }
    .btn:active { transform:scale(.97); }
    .btn-primary { background:var(--brand); color:#fff; }
    .btn-primary:hover { background:var(--brand-d); }
    .btn-outline { background:#fff; color:var(--brand-d); border:1.5px solid var(--brand); }
    .btn-outline:hover { background:var(--brand-light); }
    .btn-danger { background:#fff; color:var(--danger); border:1.5px solid var(--danger); }
    .btn-danger:hover { background:#fff3f3; }
    .btn-ghost { background:transparent; color:var(--muted); border:1px solid var(--line); }
    .btn-ghost:hover { background:var(--bg); }
    .btn-pin { background:var(--pin-bg); color:var(--pin-text); border:1px solid var(--pin-border); }
    .btn-pin:hover { background:#fff3cf; }
    .btn-sm { padding:6px 12px; font-size:13px; border-radius:8px; }

    /* ── Cards ── */
    .card {
      background:var(--card); border:1px solid var(--line);
      border-radius:var(--r); padding:20px;
      box-shadow:0 4px 16px rgba(0,0,0,.04);
    }
    .card-pinned { border-left:3px solid var(--accent); background:#fffef8; }

    /* ── Badges ── */
    .badge {
      display:inline-flex; align-items:center; gap:4px;
      padding:4px 10px; border-radius:999px; font-size:12px; font-weight:700;
    }
    .badge-cat    { background:var(--brand-light); color:#4d5a43;          border:1px solid #d9e4d6; }
    .badge-pin    { background:var(--pin-bg);    color:var(--pin-text);    border:1px solid var(--pin-border); }
    .badge-secret { background:var(--secret-bg); color:var(--secret-text); border:1px solid var(--secret-border); }

    /* ── Tags ── */
    .tags { display:flex; gap:6px; flex-wrap:wrap; margin-top:10px; min-height:24px; }
    .tag { font-size:12px; padding:3px 9px; border-radius:999px; font-weight:600; }
    .tag-auto { background:var(--brand-light); border:1px solid #d9e4d6; color:#4d5a43; }
    .tag-user { background:var(--pin-bg);      border:1px solid var(--pin-border); color:var(--pin-text); }

    /* ── Forms ── */
    .form-group { margin-bottom:22px; }
    .form-label { display:block; font-size:13px; color:#6e6e6e; margin-bottom:8px; font-weight:700; }
    .form-control {
      width:100%; padding:13px 14px; border-radius:var(--r-sm);
      border:1px solid var(--line); background:var(--input-bg);
      font-size:14px; outline:none; font-family:inherit; color:var(--text);
      transition:border-color .15s, box-shadow .15s;
    }
    .form-control:focus { border-color:var(--accent); box-shadow:0 0 0 3px rgba(201,179,138,.18); }
    .form-hint { font-size:12px; color:var(--muted); margin-top:6px; }

    /* ── Alerts ── */
    .alert { padding:12px 16px; border-radius:var(--r-sm); margin-bottom:14px; font-size:14px; }
    .alert-success { background:#f0faf0; border:1px solid #c3e6c3; color:#2e7d32; }
    .alert-error, .alert-danger { background:#fff3f3; border:1px solid #ffd4d4; color:#b00020; }

    /* ── Highlight ── */
    mark { background:#ffe566; border-radius:3px; padding:0 2px; color:inherit; }

    /* ── Layout ── */
    .main-content { padding:28px 0 60px; }
    .page-title { font-size:22px; font-weight:800; margin-bottom:20px; }
    hr { border:none; border-top:1px solid var(--line); margin:20px 0; }

    /* ── Responsive ── */
    @media (max-width:600px) {
      .username { display:none; }
      .btn { padding:8px 14px; }
      .btn-sm { padding:5px 10px; font-size:12px; }
      .card { padding:16px; }
      .page-title { font-size:18px; }
    }
  </style>
  {% block extra_css %}{% endblock %}
</head>
<body>

<header class="site-header">
  <div class="container header-inner">
    <a href="{% url 'memo:list' %}" class="brand">Focus Memo</a>
    {% if user.is_authenticated %}
    <div class="header-right">
      <span class="username">{{ user.username }} 님</span>
      <a href="{% url 'memo:create' %}" class="btn btn-primary btn-sm">+ 새 메모</a>
      <a href="{% url 'password_change' %}" class="btn btn-ghost btn-sm" title="비밀번호 변경">⚙</a>
      <form method="post" action="{% url 'logout' %}" style="margin:0">
        {% csrf_token %}
        <button class="btn btn-ghost btn-sm" type="submit">로그아웃</button>
      </form>
    </div>
    {% endif %}
  </div>
</header>

<div class="main-content">
  <div class="container">
    {% if messages %}
      {% for message in messages %}
        <div class="alert alert-{{ message.tags }}">{{ message }}</div>
      {% endfor %}
    {% endif %}
    {% block content %}{% endblock %}
  </div>
</div>

{% block extra_js %}{% endblock %}
</body>
</html>
