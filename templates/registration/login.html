{% extends "auth_base.html" %}

{% block title %}로그인 | Focus Memo{% endblock %}

{% block content %}
<h2 class="card-title">로그인</h2>

{% if form.errors %}
  <div class="errors">아이디/비밀번호를 확인해 주세요.</div>
{% endif %}

<form method="post" action="{% url 'login' %}">
  {% csrf_token %}
  <input type="hidden" name="next" value="{{ next|default:'/memo/' }}"/>

  <div class="field">
    <label class="field-label"><span class="req">*</span>아이디</label>
    <input class="input" type="text" name="username" placeholder="아이디를 입력하세요" autocomplete="username" required>
  </div>

  <div class="field">
    <label class="field-label"><span class="req">*</span>비밀번호</label>
    <input class="input" type="password" name="password" placeholder="비밀번호를 입력하세요" autocomplete="current-password" required>
  </div>

  <button class="btn" type="submit">로그인</button>
</form>

<div class="or">또는</div>
<a class="link" href="{% url 'signup' %}">회원가입</a>
{% endblock %}
