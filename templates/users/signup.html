{% extends "auth_base.html" %}

{% block title %}회원가입 | Focus Memo{% endblock %}

{% block content %}
<h2 class="card-title">회원가입</h2>

{% if form.errors %}
  <div class="errors">입력값을 확인해 주세요.</div>
{% endif %}

<form method="post">
  {% csrf_token %}

  <div class="field">
    <label class="field-label"><span class="req">*</span>아이디</label>
    <input class="input" type="text" name="username" placeholder="아이디를 입력하세요" required>
  </div>

  <div class="field">
    <label class="field-label"><span class="req">*</span>비밀번호</label>
    <input class="input" type="password" name="password1" placeholder="비밀번호를 입력하세요" required>
    <div class="hint">8자 이상, 숫자·문자 조합 권장</div>
  </div>

  <div class="field">
    <label class="field-label"><span class="req">*</span>비밀번호 확인</label>
    <input class="input" type="password" name="password2" placeholder="비밀번호를 다시 입력하세요" required>
  </div>

  <button class="btn" type="submit">회원가입</button>
</form>

<a class="link" style="margin-top:16px;" href="{% url 'login' %}">이미 계정이 있나요? 로그인</a>
{% endblock %}
